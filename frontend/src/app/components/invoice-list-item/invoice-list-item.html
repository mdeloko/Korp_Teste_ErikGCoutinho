<div class="flex flex-col sm:flex-row sm:items-center p-4 gap-4 border-t border-slate-200 dark:border-zinc-700">
    <div class="flex flex-col md:flex-row justify-between md:items-center flex-1 gap-6">

        <div class="flex flex-col justify-between items-start gap-1">
            <span class="font-medium text-slate-500 dark:text-slate-400 text-sm">Nota Fiscal</span>
            <div class="text-lg font-bold text-slate-900 dark:text-white">
                #{{ invoice.invoice_id }}
            </div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <p-tag [value]="getTranslatedStatus()" [severity]="getSeverityTag()" class="dark:bg-surface-900!" />
            <p-button [icon]="PrimeIcons.PENCIL" label="Editar" size="small" (onClick)="edit.emit(invoice)"/>
        </div>

    </div>
</div>
